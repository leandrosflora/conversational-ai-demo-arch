services:
  postgres:
    volumes:
      - ./database/conversational-ai-postgres-p0-idempotency.sql:/docker-entrypoint-initdb.d/002-p0-idempotency.sql:ro

  mongodb:
    volumes:
      - ./database/conversational-ai-mongodb-p0-consistency.js:/docker-entrypoint-initdb.d/002-p0-consistency.js:ro

  kafka-init:
    command: >
      "
      for topic in channel.message.received channel.message.status channel.webhook.received channel.webhook.received.retry channel.webhook.received.dlq intent.detected conversation.state_changed agent.events tool.executed; do
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic \"$$topic\" --partitions 3 --replication-factor 1;
      done
      "

  whatsapp-bff:
    environment:
      InternalAuth__Issuer: conversational-ai-platform
      InternalAuth__ServiceName: whatsapp-bff
      InternalAuth__OutboundSecrets__conversation-orchestrator: ${INTERNAL_AUTH_SECRET_WHATSAPP_BFF__CONVERSATION_ORCHESTRATOR:?Set INTERNAL_AUTH_SECRET_WHATSAPP_BFF__CONVERSATION_ORCHESTRATOR in .env}
      InternalAuth__InboundSecrets__conversation-orchestrator: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__WHATSAPP_BFF:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__WHATSAPP_BFF in .env}
      InternalAuth__TokenTtlSeconds: "300"
      Orchestrator__TenantId: ${DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      Redis__ConnectionString: redis:6379
      Redis__PendingTtlSeconds: "120"
      Redis__CompletedTtlSeconds: "604800"
      Kafka__RawWebhookRetryTopic: channel.webhook.received.retry
      Kafka__RawWebhookDeadLetterTopic: channel.webhook.received.dlq
      Kafka__MaxDeliveryAttempts: "5"
      Kafka__RetryBackoffSeconds: "2"
    depends_on:
      redis:
        condition: service_healthy

  conversation-orchestrator:
    environment:
      InternalAuth__Issuer: conversational-ai-platform
      InternalAuth__ServiceName: conversation-orchestrator
      InternalAuth__OutboundSecrets__whatsapp-bff: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__WHATSAPP_BFF:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__WHATSAPP_BFF in .env}
      InternalAuth__OutboundSecrets__agent-runtime-renegotiation: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__AGENT_RUNTIME_RENEGOTIATION:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__AGENT_RUNTIME_RENEGOTIATION in .env}
      InternalAuth__OutboundSecrets__conversation-audit-service: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_AUDIT_SERVICE:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_AUDIT_SERVICE in .env}
      InternalAuth__OutboundSecrets__conversation-handoff-service: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_HANDOFF_SERVICE:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_HANDOFF_SERVICE in .env}
      InternalAuth__OutboundSecrets__conversation-memory-service: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_MEMORY_SERVICE:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_MEMORY_SERVICE in .env}
      InternalAuth__InboundSecrets__whatsapp-bff: ${INTERNAL_AUTH_SECRET_WHATSAPP_BFF__CONVERSATION_ORCHESTRATOR:?Set INTERNAL_AUTH_SECRET_WHATSAPP_BFF__CONVERSATION_ORCHESTRATOR in .env}
      InternalAuth__TokenTtlSeconds: "300"
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=conversational_ai;Username=postgres;Password=postgres
      Postgres__InboxLeaseSeconds: "300"
    depends_on:
      postgres:
        condition: service_healthy

  agent-runtime-renegotiation:
    environment:
      INTERNAL_AUTH_ENABLED: "true"
      INTERNAL_AUTH_ISSUER: conversational-ai-platform
      INTERNAL_AUTH_SERVICE_NAME: agent-runtime-renegotiation
      INTERNAL_AUTH_OUTBOUND_SECRETS__tool-service-renegotiation: ${INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__TOOL_SERVICE_RENEGOTIATION:?Set INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__TOOL_SERVICE_RENEGOTIATION in .env}
      INTERNAL_AUTH_OUTBOUND_SECRETS__knowledge-service: ${INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__KNOWLEDGE_SERVICE:?Set INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__KNOWLEDGE_SERVICE in .env}
      INTERNAL_AUTH_OUTBOUND_SECRETS__conversation-memory-service: ${INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__CONVERSATION_MEMORY_SERVICE:?Set INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__CONVERSATION_MEMORY_SERVICE in .env}
      INTERNAL_AUTH_INBOUND_SECRETS__conversation-orchestrator: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__AGENT_RUNTIME_RENEGOTIATION:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__AGENT_RUNTIME_RENEGOTIATION in .env}
      INTERNAL_AUTH_TOKEN_TTL_SECONDS: "300"
      TOOL_SERVICE_AUDIENCE: tool-service-renegotiation
      KNOWLEDGE_SERVICE_AUDIENCE: knowledge-service
      CONVERSATION_MEMORY_SERVICE_AUDIENCE: conversation-memory-service

  tool-service-renegotiation:
    environment:
      INTERNAL_AUTH_ENABLED: "true"
      INTERNAL_AUTH_ISSUER: conversational-ai-platform
      INTERNAL_AUTH_SERVICE_NAME: tool-service-renegotiation
      INTERNAL_AUTH_OUTBOUND_SECRETS__renegotiation-service: ${INTERNAL_AUTH_SECRET_TOOL_SERVICE_RENEGOTIATION__RENEGOTIATION_SERVICE:?Set INTERNAL_AUTH_SECRET_TOOL_SERVICE_RENEGOTIATION__RENEGOTIATION_SERVICE in .env}
      INTERNAL_AUTH_INBOUND_SECRETS__agent-runtime-renegotiation: ${INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__TOOL_SERVICE_RENEGOTIATION:?Set INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__TOOL_SERVICE_RENEGOTIATION in .env}
      INTERNAL_AUTH_TOKEN_TTL_SECONDS: "300"
      RENEGOTIATION_SERVICE_AUDIENCE: renegotiation-service

  renegotiation-service:
    environment:
      InternalAuth__Issuer: conversational-ai-platform
      InternalAuth__ServiceName: renegotiation-service
      InternalAuth__InboundSecrets__tool-service-renegotiation: ${INTERNAL_AUTH_SECRET_TOOL_SERVICE_RENEGOTIATION__RENEGOTIATION_SERVICE:?Set INTERNAL_AUTH_SECRET_TOOL_SERVICE_RENEGOTIATION__RENEGOTIATION_SERVICE in .env}
      InternalAuth__TokenTtlSeconds: "300"
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=conversational_ai;Username=postgres;Password=postgres
      Postgres__IdempotencyLeaseSeconds: "120"
    depends_on:
      postgres:
        condition: service_healthy

  knowledge-service:
    environment:
      INTERNAL_AUTH_ENABLED: "true"
      INTERNAL_AUTH_ISSUER: conversational-ai-platform
      INTERNAL_AUTH_SERVICE_NAME: knowledge-service
      INTERNAL_AUTH_INBOUND_SECRETS__agent-runtime-renegotiation: ${INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__KNOWLEDGE_SERVICE:?Set INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__KNOWLEDGE_SERVICE in .env}
      INTERNAL_AUTH_TOKEN_TTL_SECONDS: "300"
      OPENSEARCH_INDEX_PREFIX: faq_chunks
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}

  conversation-memory-service:
    environment:
      INTERNAL_AUTH_ENABLED: "true"
      INTERNAL_AUTH_ISSUER: conversational-ai-platform
      INTERNAL_AUTH_SERVICE_NAME: conversation-memory-service
      INTERNAL_AUTH_INBOUND_SECRETS__conversation-orchestrator: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_MEMORY_SERVICE:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_MEMORY_SERVICE in .env}
      INTERNAL_AUTH_INBOUND_SECRETS__agent-runtime-renegotiation: ${INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__CONVERSATION_MEMORY_SERVICE:?Set INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__CONVERSATION_MEMORY_SERVICE in .env}
      INTERNAL_AUTH_TOKEN_TTL_SECONDS: "300"

  conversation-audit-service:
    environment:
      InternalAuth__Issuer: conversational-ai-platform
      InternalAuth__ServiceName: conversation-audit-service
      InternalAuth__InboundSecrets__conversation-orchestrator: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_AUDIT_SERVICE:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_AUDIT_SERVICE in .env}

  conversation-handoff-service:
    environment:
      InternalAuth__Issuer: conversational-ai-platform
      InternalAuth__ServiceName: conversation-handoff-service
      InternalAuth__InboundSecrets__conversation-orchestrator: ${INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_HANDOFF_SERVICE:?Set INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_HANDOFF_SERVICE in .env}
