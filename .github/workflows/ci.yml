name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Placeholder values only - satisfies the ${VAR:?...} required-var guards in
      # docker-compose.override.yml so `docker compose config` can render the merged
      # file. This never runs `docker compose up`, so no real secrets are needed; it
      # only parses and interpolates the YAML, which is what would have caught the
      # kafka-init block-scalar folding bug found by hand during the 2026-07-18 validation.
      - name: Write placeholder .env
        run: |
          cat > .env <<'EOF'
          INTERNAL_AUTH_SECRET_WHATSAPP_BFF__CONVERSATION_ORCHESTRATOR=placeholder-secret-for-ci-only-not-a-real-secret
          INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__WHATSAPP_BFF=placeholder-secret-for-ci-only-not-a-real-secret
          INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__AGENT_RUNTIME_RENEGOTIATION=placeholder-secret-for-ci-only-not-a-real-secret
          INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_AUDIT_SERVICE=placeholder-secret-for-ci-only-not-a-real-secret
          INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_HANDOFF_SERVICE=placeholder-secret-for-ci-only-not-a-real-secret
          INTERNAL_AUTH_SECRET_CONVERSATION_ORCHESTRATOR__CONVERSATION_MEMORY_SERVICE=placeholder-secret-for-ci-only-not-a-real-secret
          INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__TOOL_SERVICE_RENEGOTIATION=placeholder-secret-for-ci-only-not-a-real-secret
          INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__KNOWLEDGE_SERVICE=placeholder-secret-for-ci-only-not-a-real-secret
          INTERNAL_AUTH_SECRET_AGENT_RUNTIME_RENEGOTIATION__CONVERSATION_MEMORY_SERVICE=placeholder-secret-for-ci-only-not-a-real-secret
          INTERNAL_AUTH_SECRET_TOOL_SERVICE_RENEGOTIATION__RENEGOTIATION_SERVICE=placeholder-secret-for-ci-only-not-a-real-secret
          DEFAULT_TENANT_ID=00000000-0000-0000-0000-000000000001
          OPENAI_API_KEY=sk-placeholder-not-a-real-key
          MOCK_AGENT_ENABLED=true
          WHATSAPP_APP_SECRET=placeholder
          WHATSAPP_VERIFY_TOKEN=placeholder
          EOF

      - name: Validate docker compose configuration
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml config --quiet
