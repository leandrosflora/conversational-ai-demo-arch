name: conversational-ai-demo-arch

services:
  redis:
    image: redis:7.4-alpine
    container_name: conversational-ai-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conversational-ai

  mongodb:
    image: mongo:7
    container_name: conversational-ai-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: conversational_ai
    volumes:
      - mongodb-data:/data/db
      - ./database/conversational-ai-mongodb-init.js:/docker-entrypoint-initdb.d/001-conversational-ai-mongodb-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - conversational-ai

  postgres:
    image: postgres:16-alpine
    container_name: conversational-ai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conversational_ai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/conversational-ai-postgres-init.sql:/docker-entrypoint-initdb.d/001-conversational-ai-postgres-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conversational_ai"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - conversational-ai

  kafka:
    # bitnami/kafka:3.7 was pulled from Docker Hub (Bitnami removed the free-tier tags in 2025).
    # Switched to the official Apache Kafka image, which uses KAFKA_* env vars (no CFG_ prefix)
    # and requires an explicit KRaft CLUSTER_ID.
    image: apache/kafka:3.9.2
    container_name: conversational-ai-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      CLUSTER_ID: "rDamCnDPTyCt49uuavbNGw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - conversational-ai

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: conversational-ai-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "14268:14268" # Jaeger collector HTTP
      - "14269:14269" # Admin/metrics
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - conversational-ai

  loki:
    image: grafana/loki:2.9.8
    container_name: conversational-ai-loki
    command: -config.file=/etc/loki/local-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/local-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    networks:
      - conversational-ai

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: conversational-ai-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - jaeger
    networks:
      - conversational-ai

  grafana:
    image: grafana/grafana:11.1.4
    container_name: conversational-ai-grafana
    ports:
      # Host port 3000 is in Windows' reserved/excluded TCP port range (netsh interface
      # ipv4 show excludedportrange) on this machine, so it's mapped to 3001 instead.
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - conversational-ai

volumes:
  redis-data:
  mongodb-data:
  postgres-data:
  kafka-data:
  loki-data:
  prometheus-data:
  grafana-data:

networks:
  conversational-ai:
    driver: bridge
