name: conversational-ai-demo-arch

services:
  redis:
    image: redis:7.4-alpine
    container_name: conversational-ai-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conversational-ai

  mongodb:
    image: mongo:7
    container_name: conversational-ai-mongodb
    ports:
      # Host port 27017 collides with a native mongod.exe Windows service already listening
      # on 127.0.0.1:27017 on this machine - Windows routes loopback traffic to that more
      # specific bind over Docker's 0.0.0.0:27017, so tools like Compass silently hit the
      # wrong (much older) MongoDB instead of this container. Mapped to 27018 on the host to
      # sidestep the conflict; internal container-to-container traffic (mongodb:27017) is
      # unaffected.
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: conversational_ai
    volumes:
      - mongodb-data:/data/db
      - ./database/conversational-ai-mongodb-init.js:/docker-entrypoint-initdb.d/001-conversational-ai-mongodb-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - conversational-ai

  postgres:
    image: postgres:16-alpine
    container_name: conversational-ai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conversational_ai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/conversational-ai-postgres-init.sql:/docker-entrypoint-initdb.d/001-conversational-ai-postgres-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conversational_ai"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - conversational-ai

  opensearch:
    image: opensearchproject/opensearch:3.7.0
    container_name: conversational-ai-opensearch
    environment:
      discovery.type: single-node
      # Local-dev-only: no external exposure beyond this Docker network, same trust model
      # as the trivial admin/admin credentials already used for Redis/Mongo/Postgres above.
      # Enabling the security plugin instead would require OPENSEARCH_INITIAL_ADMIN_PASSWORD
      # (mandatory from OpenSearch 2.12 onward) for no benefit in this environment.
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - conversational-ai

  kafka:
    # bitnami/kafka:3.7 was pulled from Docker Hub (Bitnami removed the free-tier tags in 2025).
    # Switched to the official Apache Kafka image, which uses KAFKA_* env vars (no CFG_ prefix)
    # and requires an explicit KRaft CLUSTER_ID.
    image: apache/kafka:3.9.2
    container_name: conversational-ai-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      CLUSTER_ID: "rDamCnDPTyCt49uuavbNGw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - conversational-ai

  # One-shot: pre-creates every topic the app services touch. KAFKA_AUTO_CREATE_TOPICS_ENABLE
  # above only auto-creates on the first *produce*; a consumer (whatsapp-bff's
  # KafkaWebhookConsumerService) that subscribes before any producer has published is left
  # racing broker-side auto-creation-on-subscribe, which apache/kafka:3.9.2 in KRaft mode
  # does not honor even with the client's allow.auto.create.topics=true - it fails the
  # Subscribe with "Unknown topic or partition" instead. Creating topics up front sidesteps
  # that race entirely.
  kafka-init:
    image: apache/kafka:3.9.2
    container_name: conversational-ai-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      for topic in channel.message.received channel.message.status channel.webhook.received intent.detected conversation.state_changed agent.events tool.executed; do
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic \"$$topic\" --partitions 1 --replication-factor 1;
      done
      "
    networks:
      - conversational-ai

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: conversational-ai-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - conversational-ai

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: conversational-ai-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "14268:14268" # Jaeger collector HTTP
      - "14269:14269" # Admin/metrics
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - conversational-ai

  loki:
    image: grafana/loki:2.9.8
    container_name: conversational-ai-loki
    command: -config.file=/etc/loki/local-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/local-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    networks:
      - conversational-ai

  # Loki only stores what's pushed to it; nothing else in this stack ships container stdout
  # to it on its own. Promtail discovers every container via the Docker socket and tails
  # their logs, labeling each entry with its compose service name so Explore/Grafana can
  # filter by {service="whatsapp-bff"} etc.
  promtail:
    image: grafana/promtail:2.9.8
    container_name: conversational-ai-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - conversational-ai

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: conversational-ai-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - jaeger
    networks:
      - conversational-ai

  grafana:
    image: grafana/grafana:11.1.4
    container_name: conversational-ai-grafana
    ports:
      # Host port 3000 is in Windows' reserved/excluded TCP port range (netsh interface
      # ipv4 show excludedportrange) on this machine, so it's mapped to 3001 instead.
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - conversational-ai

  # --- Application services ---------------------------------------------------------------
  # Wired in pipeline order (webhook -> BFF -> orchestrator -> agent runtime -> tool service
  # -> renegotiation-service -> core bank mock). depends_on only orders container start; every
  # inter-service HttpClient already has AddStandardResilienceHandler (2 retries), so a
  # dependency that races ahead of the service it calls just retries instead of crash-looping.

  core-bancario-mock:
    build:
      context: ../core-bancario-mock
    container_name: conversational-ai-core-bancario-mock
    ports:
      - "9401:9401"
      - "9402:9402"
      - "9403:9403"
      - "9404:9404"
    networks:
      - conversational-ai

  audit-service-mock:
    build:
      context: ../audit-service-mock
    container_name: conversational-ai-audit-service-mock
    ports:
      - "8300:8300"
    networks:
      - conversational-ai

  renegotiation-service:
    build:
      context: ../renegotiation-service
    container_name: conversational-ai-renegotiation-service
    ports:
      - "5266:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ClientApi__BaseUrl: http://core-bancario-mock:9401
      ClientApi__RetryAttempts: "2"
      EligibilityApi__BaseUrl: http://core-bancario-mock:9402
      EligibilityApi__RetryAttempts: "2"
      ContractingApi__BaseUrl: http://core-bancario-mock:9403
      ContractingApi__RetryAttempts: "2"
      FormalizationApi__BaseUrl: http://core-bancario-mock:9404
      FormalizationApi__RetryAttempts: "2"
      Otel__OtlpEndpoint: http://jaeger:4317
    depends_on:
      - core-bancario-mock
    networks:
      - conversational-ai

  tool-service-renegotiation:
    build:
      context: ../tool-service-renegotiation
    container_name: conversational-ai-tool-service-renegotiation
    ports:
      - "8400:8400"
      - "8401:8401"
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8400"
      DOCS_PORT: "8401"
      RENEGOTIATION_SERVICE_BASE_URL: http://renegotiation-service:8080
      RENEGOTIATION_SERVICE_RETRY_ATTEMPTS: "2"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOOL_EVENTS_TOPIC: tool.executed
      OTEL_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
      renegotiation-service:
        condition: service_started
    networks:
      - conversational-ai

  knowledge-service:
    build:
      context: ../knowledge-service
    container_name: conversational-ai-knowledge-service
    ports:
      - "8500:8500"
    volumes:
      # Bind mount (not baked in via the Dockerfile's COPY alone): a PDF dropped into
      # ../knowledge-service/data/faq_pdfs on the host must be visible to POST /admin/reindex
      # immediately, without an image rebuild - that's the whole point of that endpoint.
      - ../knowledge-service/data/faq_pdfs:/app/data/faq_pdfs
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: faq_chunks
      FAQ_PDF_DIR: data/faq_pdfs
      SEARCH_TOP_K: "3"
      MIN_RELEVANCE_SCORE: "0.70"
      OTEL_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - conversational-ai

  agent-runtime-renegotiation:
    build:
      context: ../agent-runtime-renegotiation
    container_name: conversational-ai-agent-runtime-renegotiation
    ports:
      - "8100:8100"
    environment:
      # No OpenAI API key yet: MOCK_AGENT_ENABLED defaults to true so /process returns a
      # canned AgentDecision (keyword-matched in app/agent/mock.py) instead of calling OpenAI,
      # keeping the whole webhook -> BFF -> orchestrator -> agent runtime -> reply pipeline
      # testable end-to-end. Set MOCK_AGENT_ENABLED=false in .env once a real key below
      # is filled in.
      MOCK_AGENT_ENABLED: ${MOCK_AGENT_ENABLED:-true}
      OPENAI_MODEL_ID: ${OPENAI_MODEL_ID:-gpt-4o-mini}
      # OpenAI API key: set this in a .env file next to this compose file (see .env.example).
      # .env is gitignored - never commit a real key here or anywhere else in the repo.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TOOL_SERVICE_MCP_URL: http://tool-service-renegotiation:8400/mcp
      KNOWLEDGE_SERVICE_BASE_URL: ${KNOWLEDGE_SERVICE_BASE_URL:-http://knowledge-service:8500}
      KNOWLEDGE_SERVICE_RETRY_ATTEMPTS: "2"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_AGENT_EVENTS_TOPIC: agent.events
      CONFIDENCE_THRESHOLD: "0.6"
      OTEL_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
      tool-service-renegotiation:
        condition: service_started
      # search_knowledge_base already tolerates the Knowledge Service being unreachable
      # (fails closed to an "unavailable" message, see app/tools/knowledge.py) - this is
      # just start-order tidiness for a smoother cold start, not a correctness requirement.
      knowledge-service:
        condition: service_started
    networks:
      - conversational-ai

  conversation-orchestrator:
    build:
      context: ../conversation-orchestrator
    container_name: conversational-ai-conversation-orchestrator
    ports:
      - "5268:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      AgentRuntime__BaseUrl: http://agent-runtime-renegotiation:8100
      ChannelBff__BaseUrl: http://whatsapp-bff:8080
      # handoff-service has no repo in this workspace yet; calls will fail after 2 retries and
      # are logged, without crashing the orchestrator. audit-service-mock (below) covers Audit
      # Service so that path succeeds instead of just being tolerated.
      HandoffService__BaseUrl: ${HANDOFF_SERVICE_BASE_URL:-http://handoff-service:8200}
      AuditService__BaseUrl: http://audit-service-mock:8300
      ConversationMemory__BaseUrl: http://conversation-memory-service:8600
      ConversationMemory__TenantId: "00000000-0000-0000-0000-000000000001"
      Kafka__BootstrapServers: kafka:9092
      Kafka__IntentDetectedTopic: intent.detected
      Kafka__ConversationStateChangedTopic: conversation.state_changed
      Otel__OtlpEndpoint: http://jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
      agent-runtime-renegotiation:
        condition: service_started
      audit-service-mock:
        condition: service_started
      # Session get/save and message-history append already degrade gracefully if this is
      # unreachable (see IngestMessageUseCase) - this is start-order tidiness, not a
      # correctness requirement, matching the same pattern used for knowledge-service.
      conversation-memory-service:
        condition: service_started
    networks:
      - conversational-ai

  conversation-memory-service:
    build:
      context: ../conversation-memory-service
    container_name: conversational-ai-conversation-memory-service
    ports:
      - "8600:8600"
    environment:
      REDIS_URL: redis://redis:6379/0
      SESSION_TTL_SECONDS: "1800"
      MONGODB_URI: mongodb://conversational_ai_app:conversational_ai_app@mongodb:27017/conversational_ai
      MONGODB_DATABASE: conversational_ai
      OTEL_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - conversational-ai

  whatsapp-bff:
    build:
      context: ../whatsapp-bff
    container_name: conversational-ai-whatsapp-bff
    ports:
      - "5153:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # WhatsApp Cloud API credentials: set these in a .env file next to this compose file
      # (see .env.example). AppSecret/VerifyToken default to the same dev values used by
      # appsettings.Development.json so the webhook signature check works out of the box.
      WhatsApp__PhoneNumberId: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WhatsApp__AccessToken: ${WHATSAPP_ACCESS_TOKEN:-}
      WhatsApp__AppSecret: ${WHATSAPP_APP_SECRET:-local-dev-app-secret}
      WhatsApp__VerifyToken: ${WHATSAPP_VERIFY_TOKEN:-local-dev-verify-token}
      WhatsApp__GraphApiBaseUrl: https://graph.facebook.com/v20.0
      Orchestrator__BaseUrl: http://conversation-orchestrator:8080
      Kafka__BootstrapServers: kafka:9092
      Kafka__MessageReceivedTopic: channel.message.received
      Kafka__MessageStatusTopic: channel.message.status
      Kafka__RawWebhookReceivedTopic: channel.webhook.received
      Kafka__WebhookConsumerGroupId: whatsapp-bff-webhook-consumer
      Otel__OtlpEndpoint: http://jaeger:4317
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      conversation-orchestrator:
        condition: service_started
    networks:
      - conversational-ai

volumes:
  redis-data:
  mongodb-data:
  postgres-data:
  opensearch-data:
  kafka-data:
  loki-data:
  prometheus-data:
  grafana-data:

networks:
  conversational-ai:
    driver: bridge
