<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
<defs>
<style>
.person{fill:#08427b;stroke:#052e56;stroke-width:2}
.system{fill:#1168bd;stroke:#0b4884;stroke-width:2}
.external{fill:#999;stroke:#666;stroke-width:2}
.t1{font:bold 18px Arial;fill:white}
.t2{font:italic 12px Arial;fill:#eaeaea}
.t3{font:13px Arial;fill:white}
.title{font:bold 24px Arial;fill:#111}
.rel{font:12px Arial;fill:#444}
.line{stroke:#666;stroke-width:1.6;fill:none;marker-end:url(#a)}
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
<path d="M0 0 L10 5 L0 10z" fill="#666"/>
</marker>
</style>
</defs>

<rect width="1800" height="1100" fill="white"/>
<text x="900" y="40" text-anchor="middle" class="title">C4 Context — Conversational AI Platform</text>

<!-- people -->
<rect x="80" y="260" width="220" height="140" class="person"/>
<text x="190" y="295" text-anchor="middle" class="t2">&lt;&lt;person&gt;&gt;</text>
<text x="190" y="330" text-anchor="middle" class="t1">Cliente</text>
<text x="190" y="360" text-anchor="middle" class="t3">Cliente do banco que</text>
<text x="190" y="380" text-anchor="middle" class="t3">renegocia débitos</text>

<rect x="80" y="700" width="220" height="140" class="person"/>
<text x="190" y="735" text-anchor="middle" class="t2">&lt;&lt;person&gt;&gt;</text>
<text x="190" y="770" text-anchor="middle" class="t1">Atendente Humano</text>
<text x="190" y="800" text-anchor="middle" class="t3">Assume conversas</text>
<text x="190" y="820" text-anchor="middle" class="t3">transferidas pela IA</text>

<rect x="150" y="470" width="320" height="160" class="external"/>
<text x="310" y="505" text-anchor="middle" class="t2">&lt;&lt;external system&gt;&gt;</text>
<text x="310" y="545" text-anchor="middle" class="t1">WhatsApp BSP</text>
<text x="310" y="580" text-anchor="middle" class="t3">Recebe e envia mensagens</text>
<text x="310" y="600" text-anchor="middle" class="t3">WhatsApp</text>

<!-- central system -->
<rect x="700" y="400" width="420" height="220" class="system"/>
<text x="910" y="445" text-anchor="middle" class="t2">&lt;&lt;software system&gt;&gt;</text>
<text x="910" y="495" text-anchor="middle" class="t1">Plataforma de IA Conversacional</text>
<text x="910" y="535" text-anchor="middle" class="t3">Renegociação bancária com agentes,</text>
<text x="910" y="560" text-anchor="middle" class="t3">RAG, MCP, auditoria e handoff humano</text>

<!-- external systems -->
<rect x="1320" y="120" width="300" height="120" class="external"/>
<text x="1470" y="150" text-anchor="middle" class="t2">&lt;&lt;external system&gt;&gt;</text>
<text x="1470" y="190" text-anchor="middle" class="t1">Salesforce CRM</text>
<text x="1470" y="220" text-anchor="middle" class="t3">Clientes e campanhas</text>

<rect x="1320" y="290" width="300" height="120" class="external"/>
<text x="1470" y="320" text-anchor="middle" class="t2">&lt;&lt;external system&gt;&gt;</text>
<text x="1470" y="360" text-anchor="middle" class="t1">Data Lake Corporativo</text>
<text x="1470" y="390" text-anchor="middle" class="t3">Analytics e auditoria</text>

<rect x="1320" y="460" width="300" height="120" class="external"/>
<text x="1470" y="490" text-anchor="middle" class="t2">&lt;&lt;external system&gt;&gt;</text>
<text x="1470" y="530" text-anchor="middle" class="t1">Core Bancário</text>
<text x="1470" y="560" text-anchor="middle" class="t3">Débitos, ofertas e acordos</text>

<rect x="1320" y="630" width="300" height="120" class="external"/>
<text x="1470" y="660" text-anchor="middle" class="t2">&lt;&lt;external system&gt;&gt;</text>
<text x="1470" y="700" text-anchor="middle" class="t1">Amazon Bedrock</text>
<text x="1470" y="730" text-anchor="middle" class="t3">Modelos fundacionais</text>

<rect x="1320" y="800" width="300" height="120" class="external"/>
<text x="1470" y="830" text-anchor="middle" class="t2">&lt;&lt;external system&gt;&gt;</text>
<text x="1470" y="870" text-anchor="middle" class="t1">OpenSearch</text>
<text x="1470" y="900" text-anchor="middle" class="t3">Busca vetorial e RAG</text>

<rect x="1320" y="970" width="300" height="120" class="external"/>
<text x="1470" y="1000" text-anchor="middle" class="t2">&lt;&lt;external system&gt;&gt;</text>
<text x="1470" y="1040" text-anchor="middle" class="t1">Plataforma Atendimento</text>
<text x="1470" y="1070" text-anchor="middle" class="t3">Operação humana</text>

<!-- relationships -->
<path class="line" d="M300 330 L700 480"/>
<text x="500" y="380" class="rel">Interage via WhatsApp</text>

<path class="line" d="M470 550 L700 520"/>
<text x="560" y="515" class="rel">Entrega mensagens e respostas</text>

<path class="line" d="M1120 500 L1320 520"/>
<text x="1180" y="485" class="rel">Consulta e formaliza acordos</text>

<path class="line" d="M1120 540 L1320 690"/>
<text x="1185" y="625" class="rel">Inferência de IA</text>

<path class="line" d="M1120 570 L1320 860"/>
<text x="1180" y="790" class="rel">Busca semântica / RAG</text>

<path class="line" d="M1120 470 L1320 350"/>
<text x="1190" y="390" class="rel">Publica eventos auditáveis</text>

<path class="line" d="M1470 240 L1470 290"/>
<text x="1500" y="270" class="rel">Alimenta</text>

<path class="line" d="M1120 600 L1320 1030"/>
<text x="1190" y="900" class="rel">Transfere conversa e contexto</text>

<path class="line" d="M1320 1030 L300 770"/>
<text x="780" y="970" class="rel">Atendimento humano</text>

</svg>