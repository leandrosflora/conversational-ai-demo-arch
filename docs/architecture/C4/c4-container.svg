    <text x="102.5" y="73" text-anchor="middle" class="name">Service</text>
    <text x="102.5" y="94" text-anchor="middle" class="tech">[.NET]</text>
    <text x="102.5" y="116" text-anchor="middle" class="desc">Elegibilidade, simulação e acordo</text>
  </g>

