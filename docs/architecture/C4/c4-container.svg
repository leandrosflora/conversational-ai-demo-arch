    <path d="M73 78 C78 52,132 52,137 78 Z" class="icon"/>
    <text x="105" y="96" text-anchor="middle" class="stereo">&lt;&lt;person&gt;&gt;</text>
    <text x="105" y="120" text-anchor="middle" class="name">Cliente</text>
    <text x="105" y="142" text-anchor="middle" class="desc">Interage via WhatsApp</text>
  </g>

  <g transform="translate(1740,135)">
