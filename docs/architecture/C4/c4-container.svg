    <text x="100" y="94" text-anchor="middle" class="desc">Normaliza mensagens do canal</text>
    <text x="100" y="112" text-anchor="middle" class="desc">e abstrai o WhatsApp</text>
  </g>

  <g transform="translate(980,575)">
