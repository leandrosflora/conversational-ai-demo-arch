<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1500" viewBox="0 0 2200 1500" role="img" aria-labelledby="title desc">
  <title id="title">C4 Container — Conversational AI Platform</title>
  <desc id="desc">C4 Container diagram for a conversational AI platform used for banking debt renegotiation through WhatsApp, with governed agents, RAG, MCP tools, auditability, handoff, and corporate integrations.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>

    <style>
      .page-title{font:700 24px Arial, Helvetica, sans-serif;fill:#111}
      .system-title{font:700 18px Arial, Helvetica, sans-serif;fill:#333}
      .system-type{font:700 13px Arial, Helvetica, sans-serif;fill:#333}
      .name{font:700 17px Arial, Helvetica, sans-serif;fill:#fff}
      .stereo{font:italic 12px Arial, Helvetica, sans-serif;fill:#eaf3ff}
      .tech{font:700 13px Arial, Helvetica, sans-serif;fill:#eaf3ff}
      .desc{font:400 13px Arial, Helvetica, sans-serif;fill:#fff}
      .external-name{font:700 16px Arial, Helvetica, sans-serif;fill:#fff}
      .external-desc{font:400 13px Arial, Helvetica, sans-serif;fill:#fff}
      .external-stereo{font:italic 12px Arial, Helvetica, sans-serif;fill:#eee}
      .rel{font:700 11px Arial, Helvetica, sans-serif;fill:#555}
      .protocol{font:italic 10px Arial, Helvetica, sans-serif;fill:#777}
      .note{font:400 12px Arial, Helvetica, sans-serif;fill:#333}
      .person{fill:#08427b;stroke:#052e56;stroke-width:2;filter:url(#shadow)}
      .container{fill:#438dd5;stroke:#2e6295;stroke-width:2;filter:url(#shadow)}
      .database{fill:#438dd5;stroke:#2e6295;stroke-width:2;filter:url(#shadow)}
      .external{fill:#999;stroke:#707070;stroke-width:2;filter:url(#shadow)}
      .boundary{fill:none;stroke:#777;stroke-width:2;stroke-dasharray:8 8}
      .arrow{stroke:#666;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
      .arrow-soft{stroke:#888;stroke-width:1.4;fill:none;marker-end:url(#arrow)}
      .arrow-event{stroke:#666;stroke-width:1.5;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}
      .icon{fill:#fff}
    </style>
  </defs>

  <rect width="2200" height="1500" fill="#fff"/>
  <text x="1100" y="38" text-anchor="middle" class="page-title">C4 Container — Conversational AI Platform</text>

  <!-- System boundary -->
