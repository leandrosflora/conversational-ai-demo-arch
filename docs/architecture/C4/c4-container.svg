    <text x="102.5" y="52" text-anchor="middle" class="name">Memory Service</text>
    <text x="102.5" y="74" text-anchor="middle" class="tech">[Python / FastAPI]</text>
    <text x="102.5" y="98" text-anchor="middle" class="desc">Memória curta, histórico</text>
