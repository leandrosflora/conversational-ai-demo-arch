    <text x="107.5" y="25" text-anchor="middle" class="stereo">&lt;&lt;container&gt;&gt;</text>
    <text x="107.5" y="52" text-anchor="middle" class="name">Conversation</text>
    <text x="107.5" y="73" text-anchor="middle" class="name">Orchestrator</text>
    <text x="107.5" y="94" text-anchor="middle" class="tech">[Python / FastAPI]</text>
    <text x="107.5" y="116" text-anchor="middle" class="desc">Sessão, intenção e roteamento</text>
